<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TechInnov Gabon</title>
    <!-- Liaison avec ta feuille de style CSS globale -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">TechInnov</div>
        <nav aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="about.html">À propos</a></li>
                <li><a href="services.html">Nos services</a></li>
                <li><a href="actualite.html">Actualités</a></li>
                <li><a href="contact.html" class="active" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Contactez-nous</h1>
            <p>Une question ou un projet ? Remplissez ce formulaire et nous vous répondrons sous 24h.</p>

            <form action="#" method="post" class="contact-form">
                <p>
                    <label for="fullname">Nom complet :</label>
                    <input type="text" id="fullname" name="fullname" required placeholder="Ex. Jean Eyeghe">
                </p>

                <p>
                    <label for="contact-email">Adresse e-mail :</label>
                    <input type="email" id="contact-email" name="contact-email" required placeholder="jean.eyeghe@domaine.com">
                </p>

                <p>
                    <label for="phone">Téléphone (Optionnel) :</label>
                    <input type="tel" id="phone" name="phone" placeholder="+241 06 00 00 00">
                </p>

                <p>
                    <label for="subject">Sujet de votre demande :</label>
                    <select id="subject" name="subject" required>
                        <option value="">-- Veuillez choisir une option --</option>
                        <option value="devis">Demande de devis</option>
                        <option value="partenariat">Opportunité de partenariat</option>
                        <option value="autre">Autre demande</option>
                    </select>
                </p>

                <p>
                    <label for="message">Message :</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Décrivez votre projet en quelques lignes..."></textarea>
                </p>

                <p class="checkbox-group">
                    <input type="checkbox" id="legal" name="legal" required>
                    <label for="legal">J'accepte que mes données soient traitées pour répondre à ma demande.</label>
                </p>

                <p>
                    <button type="submit" class="btn-primary">Envoyer le message</button>
                </p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechInnov Gabon. Tous droits réservés.</p>
    </footer>

</body>
</html>
